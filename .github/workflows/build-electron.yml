name: Build Electron App

on:
  push:
    tags:
      - 'v*'
    branches:
      - win-build-v1
  pull_request:
    branches:
      - win-build-v1
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: false
        default: ''
      release:
        description: 'Create GitHub release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  NODE_VERSION: '20.x'
  
jobs:
  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          npm install
          composer update
          composer install
          
      - name: Build frontend assets
        run: npm run build
        
      - name: Install Electron Forge
        run: npm install --save-dev @electron-forge/cli @electron-forge/maker-squirrel @electron-forge/maker-zip @electron-forge/plugin-auto-unpack-natives @electron-forge/plugin-fuses @electron/fuses
        
      - name: Package Electron app
        run: npx electron-forge package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create Windows Installer
        run: npx electron-forge make --platform=win32 --arch=x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: List output files
        run: |
          echo "=== out directory ==="
          dir out -Recurse
          
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: out/make/**/*
          retention-days: 30
          
      - name: Upload Windows Portable
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: out/Anufa Minerva-win32-x64/**/*
          retention-days: 30

