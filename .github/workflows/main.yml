name: Build and Upload to cPanel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options:
          - production
          - development
        default: production

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo_mysql, dom, gd
          coverage: none

      - name: Install Composer dependencies
        run: |
          composer install \
            --no-dev \
            --prefer-dist \
            --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Create deploy archives
        run: |
          zip -rq app.zip . -x '.git/*' '.github/*' 'node_modules/*' 'tests/*' '.env' 'public/build/*' '*.zip'
          cd public && zip -rq ../build.zip build && cd ..

      - name: Upload app archive
        run: |
          curl -sS -T app.zip --ftp-create-dirs \
            "ftp://${{ secrets.CPANEL_HOST }}/${{ vars.CPANEL_SUBDOMAIN_PATH }}/app.zip" \
            --user "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}"

      - name: Upload build archive
        run: |
          curl -sS -T build.zip --ftp-create-dirs \
            "ftp://${{ secrets.CPANEL_HOST }}/${{ vars.CPANEL_DOCROOT_PATH }}/build.zip" \
            --user "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}"
