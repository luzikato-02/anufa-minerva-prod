<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anufa Minerva - Server Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .setup-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 40px;
            width: 100%;
            max-width: 480px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .logo p {
            color: #64748b;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .form-group .help-text {
            margin-top: 6px;
            font-size: 12px;
            color: #6b7280;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            padding: 0 16px;
            color: #9ca3af;
            font-size: 12px;
            text-transform: uppercase;
        }

        .offline-info {
            background: #f8fafc;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .offline-info p {
            color: #64748b;
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="logo">
            <h1>🏭 Anufa Minerva</h1>
            <p>Production Data Management System</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="setupForm">
            <div class="form-group">
                <label for="serverUrl">Server URL</label>
                <input 
                    type="url" 
                    id="serverUrl" 
                    name="serverUrl" 
                    placeholder="https://your-server.com"
                    required
                >
                <p class="help-text">Enter the URL of your Laravel server to sync data</p>
            </div>

            <button type="submit" class="btn btn-primary" id="connectBtn">
                Connect to Server
            </button>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <div class="offline-info">
            <p>You can use the app offline without configuring a server. Data will be stored locally and can be synced later.</p>
        </div>

        <button type="button" class="btn btn-secondary" id="offlineBtn">
            Continue Offline
        </button>
    </div>

    <script>
        const form = document.getElementById('setupForm');
        const serverUrlInput = document.getElementById('serverUrl');
        const connectBtn = document.getElementById('connectBtn');
        const offlineBtn = document.getElementById('offlineBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        function setLoading(loading) {
            connectBtn.disabled = loading;
            if (loading) {
                connectBtn.innerHTML = '<span class="loading"></span>Connecting...';
            } else {
                connectBtn.innerHTML = 'Connect to Server';
            }
        }

        async function testConnection(url) {
            try {
                const response = await fetch(`${url}/csrf-token`, {
                    method: 'GET',
                    mode: 'cors',
                    credentials: 'include',
                });
                return response.ok;
            } catch (error) {
                console.error('Connection test failed:', error);
                return false;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let url = serverUrlInput.value.trim();
            
            // Remove trailing slash
            if (url.endsWith('/')) {
                url = url.slice(0, -1);
            }

            setLoading(true);
            errorMessage.style.display = 'none';

            const isConnected = await testConnection(url);

            if (isConnected) {
                showSuccess('Connected successfully! Redirecting...');
                
                // Store the URL and redirect
                if (window.electronAPI) {
                    await window.electronAPI.setServerUrl(url);
                }
            } else {
                showError('Could not connect to the server. Please check the URL and try again.');
            }

            setLoading(false);
        });

        offlineBtn.addEventListener('click', () => {
            // In offline mode, we'll load a simple local interface
            showSuccess('Starting in offline mode...');
            // You could redirect to a local offline page here
        });
    </script>
</body>
</html>
